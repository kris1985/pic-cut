name: Build Multi-Platform Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build Windows EXE
      run: python build_simple.py
      
    - name: Upload Windows artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-exe
        path: |
          dist/*.exe
          dist/使用说明.txt
          dist/版本信息.txt
        if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build macOS App
      run: python build_simple.py
      
    - name: Upload macOS artifacts
      uses: actions/upload-artifact@v4
      with:
        name: macos-app
        path: |
          dist/*.app
          dist/ShoeImageCropper_v3.0_macOS*
        if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        sudo apt-get update
        sudo apt-get install -y python3-tk xvfb
        
    - name: Build Linux Binary
      run: |
        export DISPLAY=:99
        Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
        python build_simple.py
      
    - name: Upload Linux artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-binary
        path: |
          dist/ShoeImageCropper_v3.0_linux*
        if-no-files-found: warn

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          windows-exe/*
          macos-app/*
          linux-binary/*
        body: |
          ## 鞋子图片智能裁剪工具 v3.0 - 智能阴影检测版
          
          ### 🚀 v3.0 重大更新 - 智能阴影检测
          - **智能轮廓断开机制**: 新增矩形腐蚀核，适应横向长条状鞋子轮廓
          - **边缘保护机制**: 保护高梯度边缘（如蝴蝶结等细小结构）
          - **轮廓异常检测**: 对称性、宽高比、面积占比多维度分析
          - **改进阴影过滤**: 更准确的阴影检测和移除
          - **GUI优化**: 默认边距改为5%，快速模式默认关闭
          
          ### 📦 下载说明
          - **Windows用户**: 下载 `ShoeImageCropper_v3.0_x64.exe`
          - **macOS用户**: 下载 `.app` 文件或 `ShoeImageCropper_v3.0_macOS`
          - **Linux用户**: 下载 `ShoeImageCropper_v3.0_linux`
          
          ### ✨ 核心功能特性
          - 🔥 **NEW** 快速模式 (3倍+性能提升)
          - 🔥 智能边距控制 (10%左右边距)
          - 🔥 5.5:4.5上下比例定位 (视觉效果更佳)
          - 🔥 智能背景颜色检测和填充
          - 🔥 真正的轮廓边距控制
          - 🔥 自动4:3/3:4比例选择
          - 🔥 高分辨率模式优化
          - 🔥 多策略对象检测算法
          
          ### 📊 性能对比
          | 功能 | v2.0 | v2.1 | 提升 |
          |------|------|------|------|
          | 背景检测 | 3.12秒 | 1.00秒 | **3.1倍** |
          | 整体处理 | 基准 | 优化后 | **2-4倍** |
          
          ### 🖥️ 系统要求
          - **Windows**: Windows 7/8/10/11 (64位)
          - **macOS**: macOS 10.14+
          - **Linux**: Ubuntu 18.04+ / CentOS 7+
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} 